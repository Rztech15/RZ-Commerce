    <style>
        :root {
            --bg-dark: #0b0c10;
            --bg-surface: #1f2833;
            --primary-gold: #c5a880;
            --primary-light: #e5c59e;
            --text-light: #f5f5f7;
            --text-muted: #c5a88099;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header / Navbar */
        header {
            background-color: rgba(11, 12, 16, 0.95);
            border-bottom: 1px solid rgba(197, 168, 128, 0.2);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-img {
            height: 50px;
            object-fit: contain;
        }

        .cart-icon-btn {
            background: none;
            border: none;
            color: var(--primary-gold);
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .cart-icon-btn:hover {
            color: var(--primary-light);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #ff4d4d;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 50%;
            padding: 2px 6px;
        }

        /* Hero Banner Section */
        .hero-section {
            margin-top: 80px;
            position: relative;
            width: 100%;
            max-height: 500px;
            overflow: hidden;
        }

        .hero-banner {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }

        /* Product Catalog Grid */
        .catalog-container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            text-align: center;
            color: var(--primary-gold);
            margin-bottom: 3rem;
            letter-spacing: 1px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background-color: var(--bg-surface);
            border: 1px solid rgba(197, 168, 128, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-gold);
            box-shadow: 0 10px 20px rgba(197, 168, 128, 0.05);
        }

        /* Main Display Image */
        .product-image-container {
            position: relative;
            width: 100%;
            height: 250px;
            overflow: hidden;
            border-radius: 8px;
            background: #111;
        }

        .product-main-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        /* Interactive Multi-Image Thumbnails */
        .thumbnail-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
            justify-content: center;
        }

        .thumb-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: var(--transition);
        }

        .thumb-img:hover, .thumb-img.active {
            border-color: var(--primary-gold);
            opacity: 0.8;
        }

        .product-info {
            margin-top: 1.2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--white);
            margin-bottom: 0.5rem;
        }

        .price-tag {
            font-size: 1.2rem;
            color: var(--primary-gold);
            font-weight: 600;
            margin-bottom: 1.2rem;
        }

        .add-to-cart-btn {
            background: linear-gradient(135deg, var(--primary-gold), #9e8259);
            color: var(--bg-dark);
            border: none;
            padding: 0.8rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: auto;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .add-to-cart-btn:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary-gold));
            transform: scale(1.02);
        }

        /* Sliding Slide-Out Shopping Cart Drawer */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background-color: var(--bg-surface);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            z-index: 2000;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(197, 168, 128, 0.2);
        }

        .cart-drawer.open {
            right: 0;
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(197, 168, 128, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-gold);
        }

        .close-cart-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items-body {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            background: rgba(0,0,0,0.2);
            padding: 0.8rem;
            border-radius: 6px;
        }

        .cart-item-details h4 {
            font-size: 0.95rem;
            color: var(--white);
        }

        .cart-item-details p {
            font-size: 0.85rem;
            color: var(--primary-gold);
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.4rem;
        }

        .qty-btn {
            background: var(--bg-dark);
            border: 1px solid rgba(197, 168, 128, 0.3);
            color: var(--white);
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
        }

        .remove-item-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(197, 168, 128, 0.1);
            background: rgba(0,0,0,0.1);
        }

        .total-price-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--white);
        }

        /* Order Checkout Form Inside Drawer */
        .checkout-form {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .checkout-form input {
            background: var(--bg-dark);
            border: 1px solid rgba(197, 168, 128, 0.3);
            padding: 0.6rem;
            color: white;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .checkout-form input:focus {
            outline: none;
            border-color: var(--primary-gold);
        }

        .submit-order-btn {
            background: #25d366; /* WhatsApp Green */
            color: white;
            border: none;
            padding: 0.8rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .submit-order-btn:hover {
            background: #20ba5a;
            transform: translateY(-2px);
        }

        /* Business Footer Information */
        footer {
            background: #060709;
            border-top: 1px solid rgba(197, 168, 128, 0.1);
            padding: 2rem 0;
            text-align: center;

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | RZ Commerce</title>
<link rel="icon" type="image/jpeg" href="rz commerce logo.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
  .wrap{max-width:500px;}
  .err-num{font-family:'Playfair Display',serif;font-size:8rem;font-weight:800;background:linear-gradient(90deg,#c9a84c,#e8c97a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
  .err-title{font-size:1.8rem;font-weight:800;color:#fff;margin:1rem 0 0.5rem;}
  .err-sub{color:#888;font-size:0.95rem;line-height:1.7;margin-bottom:2.5rem;}
  .btn-home{background:linear-gradient(90deg,#c9a84c,#e8c97a);color:#000;padding:14px 32px;font-size:0.9rem;font-weight:800;text-decoration:none;display:inline-flex;align-items:center;gap:8px;letter-spacing:0.08em;text-transform:uppercase;margin-right:0.8rem;transition:opacity 0.2s;}
  .btn-home:hover{opacity:0.88;}
  .btn-wa{background:#25D366;color:#fff;padding:14px 24px;font-size:0.9rem;font-weight:800;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:opacity 0.2s;}
  .btn-wa:hover{opacity:0.88;}
  .btns{display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;}
  .icon{font-size:4rem;margin-bottom:1rem;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🔍</div>
    <div class="err-num">404</div>
    <h1 class="err-title">Page Not Found</h1>
    <p class="err-sub">Yeh page exist nahi karta ya move ho gaya hai.<br>Ghar wapis jao ya WhatsApp pe order karein!</p>
    <div class="btns">
      <a href="/" class="btn-home">🏠 Go Home</a>
      <a href="https://wa.me/923207895540" target="_blank" class="btn-wa">💬 WhatsApp</a>
    </div>
  </div>
</body>
</html>
